<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${cafe.name} + ' - Smart PS Lounge'">Cafe Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'neon-cyan': '#00ffff', 'neon-purple': '#8b5cf6', 'neon-green': '#10b981', 'dark-bg': '#0a0a0a', 'dark-secondary': '#1a1a1a' },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', monospace; }
        .text-glow { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
        .btn-gaming { background: linear-gradient(45deg, #8b5cf6, #00ffff); }
        .pc-card { background: linear-gradient(135deg, rgba(26, 26, 26, 0.9), rgba(42, 42, 42, 0.9)); border: 1px solid rgba(0, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-dark-bg text-white font-rajdhani">
<nav class="fixed top-0 w-full bg-dark-secondary/90 backdrop-blur-md border-b border-neon-cyan/20 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between">
        <a th:href="@{/}" class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-gradient-to-r from-neon-purple to-neon-cyan rounded-lg flex items-center justify-center"><span class="font-orbitron font-bold text-lg text-dark-bg">PS</span></div>
            <span class="font-orbitron font-bold text-xl text-neon-cyan">Smart PS lounge</span>
        </a>
        <a th:href="@{/user/cafes}" class="text-gray-300 hover:text-neon-cyan">&laquo; Back to List</a>
    </div>
</nav>
<section class="pt-32 pb-10 bg-dark-bg text-center">
    <h1 class="font-orbitron text-5xl font-bold text-glow text-neon-cyan" th:text="${cafe.name}">Cafe Name</h1>
    <p class="text-gray-400 mt-2" th:text="${cafe.address}">Cafe Address</p>
</section>
<section class="py-20 bg-dark-secondary">
    <div class="container mx-auto px-6">
        <h2 class="font-orbitron font-bold text-4xl text-center text-glow text-neon-purple mb-12">Available PCs</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div th:each="pc : ${cafe.pcs}" class="pc-card rounded-xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-orbitron text-xl font-bold text-neon-cyan" th:text="'Seat ' + ${pc.seatNumber}">Seat #</h3>
                    <span class="px-3 py-1 rounded-full text-sm font-semibold" th:text="${pc.available == 'true' ? 'Available' : 'Booked'}"
                          th:classappend="${pc.available == 'true'} ? 'bg-neon-green/20 text-neon-green' : 'bg-red-500/20 text-red-400'"></span>
                </div>
                <p class="text-gray-400 mb-6" th:text="${pc.configuration}">PC Specs</p>
                <form th:action="@{/user/book}" method="post" th:if="${pc.available == 'true'}">
                    <input type="hidden" name="pcId" th:value="${pc.id}" />
                    <button type="submit" class="w-full btn-gaming py-2 rounded-lg font-semibold">Book Now</button>
                </form>
                <button th:if="${pc.available != 'true'}" class="w-full bg-gray-600 py-2 rounded-lg font-semibold cursor-not-allowed" disabled>Booked</button>
            </div>
        </div>
    </div>
</section>
</body>
</html>
