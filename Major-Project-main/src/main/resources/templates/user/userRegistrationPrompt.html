<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
<div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-lg">
  <h2 class="text-2xl font-bold text-center">Register as a User</h2>
  <form th:action="@{'/register/user'}" th:object="${user}" method="post">
    <input type="hidden" name="pcId" th:value="${pcId}" />
    <input type="hidden" name="startTime" th:value="${startTime}" />

    <div>
      <label for="name" class="block text-sm font-medium">Name</label>
      <input id="name" type="text" th:field="*{name}" class="w-full px-3 py-2 mt-1 text-gray-900 rounded-md" required>
    </div>
    <div class="mt-4">
      <label for="email" class="block text-sm font-medium">Email</label>
      <input id="email" type="email" th:field="*{email}" class="w-full px-3 py-2 mt-1 text-gray-900 rounded-md" required>
    </div>
    <div class="mt-4">
      <label for="phone" class="block text-sm font-medium">Phone</label>
      <input id="phone" type="text" th:field="*{phone}" class="w-full px-3 py-2 mt-1 text-gray-900 rounded-md" required>
    </div>
    <div class="mt-4">
      <label for="password" class="block text-sm font-medium">Password</label>
      <input id="password" type="password" th:field="*{password}" class="w-full px-3 py-2 mt-1 text-gray-900 rounded-md" required>
    </div>
    <div class="mt-6">
      <button type="submit" class="w-full px-4 py-2 font-bold text-white bg-blue-500 rounded-md hover:bg-blue-700">Register</button>
    </div>
  </form>
</div>
</body>
</html>
