<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','neon-green':'#10b981','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', monospace; }
        .sidebar-link.active { background-color: #00ffff20; border-left: 3px solid #00ffff; color: #00ffff; }
    </style>
</head>
<body class="bg-dark-bg text-white flex">
<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20"><h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1></div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold">📈 Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold">☕ Manage Cafes</a>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>
<main class="flex-1 p-8">
    <h1 class="font-orbitron text-4xl font-bold text-neon-purple mb-8">Slots for PC #<span th:text="${pcId}"></span></h1>
    <div class="bg-dark-secondary border border-neon-cyan/20 rounded-xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-dark-tertiary/50">
            <tr>
                <th class="p-4 font-orbitron">Start Time</th>
                <th class="p-4 font-orbitron">End Time</th>
                <th class="p-4 font-orbitron">Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="slot : ${slots}" class="border-t border-neon-cyan/10">
                <td class="p-4" th:text="${slot.startTime}"></td>
                <td class="p-4" th:text="${slot.endTime}"></td>
                <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-sm font-semibold" th:text="${slot.status}"
                              th:classappend="${slot.status == 'open'} ? 'bg-neon-green/20 text-neon-green' : 'bg-red-500/20 text-red-400'"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
